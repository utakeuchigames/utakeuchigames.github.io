<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Generator</title>
    <style>
        :root {
            --main-bg-color: #fff;
            --main-text-color: #000;
            --button-bg-color: #008CBA;
            --button-text-color: #fff;
        }
        body {
            background-color: var(--main-bg-color);
            color: var(--main-text-color);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        button {
            background-color: var(--button-bg-color);
            color: var(--button-text-color);
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }
        button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <h1>CSS Generator</h1>
    <div id="template-selector">
        <h2>Select a Template</h2>
        <button onclick="loadTemplate('A')">Template A</button>
        <button onclick="loadTemplate('B')">Template B</button>
        <button onclick="loadTemplate('C')">Template C</button>
    </div>
    <div id="template-content"></div>
    <script>
        function loadTemplate(templateName) {
            fetch(`templates/${templateName}.html`)
                .then(response => response.text())
                .then(html => {
                    document.getElementById('template-content').innerHTML = html;
                })
                .catch(error => {
                    console.error('Error loading template:', error);
                });
        }
    </script>
</body>
</html>
