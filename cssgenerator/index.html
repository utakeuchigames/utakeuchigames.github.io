<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSSジェネレーター</title>
    <meta name="author" content="utakeuchigames">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.5em;
        }

        h2 {
            color: #555;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .templates-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
        }

        .template-item {
            background: white;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .template-item:hover {
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.2);
            transform: translateX(5px);
        }

        .template-item.active {
            background: #e7f0ff;
            border-left-color: #667eea;
        }

        .template-name {
            font-weight: 600;
            color: #333;
            font-size: 1.1em;
        }

        .editor-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
        }

        .property-input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        .custom-select {
            position: relative;
            margin-bottom: 10px;
        }

        .select-trigger {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            background: white;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.3s;
            font-size: 1em;
        }

        .select-trigger:hover {
            border-color: #667eea;
        }

        .select-trigger.active {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .select-arrow {
            font-size: 0.8em;
            color: #667eea;
            transition: transform 0.3s;
        }

        .select-trigger.active .select-arrow {
            transform: rotate(180deg);
        }

        .select-options {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ddd;
            border-top: none;
            border-radius: 0 0 5px 5px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .select-options.active {
            display: block;
        }

        .select-option {
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .select-option:hover {
            background: #e7f0ff;
        }

        .select-option-name {
            font-weight: 600;
            color: #667eea;
            font-family: 'Courier New', monospace;
            font-size: 0.95em;
        }

        .select-option-desc {
            font-size: 0.85em;
            color: #777;
            margin-top: 3px;
        }

        .property-description {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 12px 15px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 0.95em;
            color: #1565c0;
            display: none;
        }

        .property-description.active {
            display: block;
        }

        .property-description strong {
            display: block;
            margin-bottom: 5px;
        }

        .input-wrapper {
            margin-bottom: 10px;
        }

        input[type="text"],
        input[type="color"],
        textarea {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="color"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 0.9em;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .css-rules-list {
            background: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .css-rule-item {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .css-rule-item:last-child {
            border-bottom: none;
        }

        .css-rule-property {
            font-weight: 600;
            color: #667eea;
            font-family: 'Courier New', monospace;
        }

        .css-rule-value {
            color: #666;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }

        .preview-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 30px;
        }

        .output {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 0.95em;
            line-height: 1.5;
            max-height: 300px;
            overflow-y: auto;
        }

        code {
            font-family: 'Courier New', monospace;
        }

        .preview-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
        }

        .preview-content {
            background: white;
            border: 2px solid #ddd;
            border-radius: 5px;
            padding: 20px;
            overflow-y: auto;
            max-height: 500px;
        }

        .copy-btn {
            width: 100%;
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .empty-list {
            padding: 20px;
            text-align: center;
            color: #999;
        }

        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CSSジェネレーター</h1>
        
        <div class="main-layout">
            <div class="templates-section">
                <h2>テンプレート</h2>
                <div id="templates-list"></div>
            </div>

            <div class="editor-section">
                <h2>CSS設定</h2>
                
                <div class="property-input-group">
                    <label>プロパティを選択:</label>
                    <div class="custom-select">
                        <div class="select-trigger" id="property-trigger">
                            <span id="property-selected">プロパティを選択...</span>
                            <span class="select-arrow">▼</span>
                        </div>
                        <div class="select-options" id="property-options"></div>
                    </div>
                    <div class="property-description" id="property-description"></div>
                </div>

                <div class="property-input-group">
                    <label>値:</label>
                    <div class="input-wrapper">
                        <input type="text" id="value-input" placeholder="値を入力（例：#333, 10px, 1.5）">
                    </div>
                    <button class="btn btn-primary" id="add-btn" style="width: 100%;">追加</button>
                </div>

                <h3 style="margin-top: 20px; margin-bottom: 10px; font-size: 1.1em; color: #555;">追加されたプロパティ:</h3>
                <div class="css-rules-list" id="css-rules-list">
                    <div class="empty-list">プロパティはまだ追加されていません</div>
                </div>

                <button class="btn btn-danger" id="clear-btn" style="width: 100%; margin-top: 15px;">すべてクリア</button>
            </div>
        </div>

        <div class="preview-section">
            <h2>プレビュー</h2>
            
            <div class="output">
                <h3 style="margin-bottom: 10px; font-size: 1.1em;">生成されたCSS:</h3>
                <pre id="css-output"><code>/* CSSがここに表示されます */</code></pre>
                <button id="copy-btn" class="btn btn-primary copy-btn">コピー</button>
            </div>

            <div class="preview-box">
                <h3 style="margin-bottom: 10px; font-size: 1.1em;">プレビュー:</h3>
                <div id="preview" class="preview-content">
                    <div class="loading">テンプレートを選択してください</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // CSSプロパティの辞書（説明付き）
            const cssProperties = {
                'color': { desc: 'テキスト色', example: '#333, rgb(51,51,51), blue' },
                'background-color': { desc: '背景色', example: '#fff, rgba(255,255,255,0.5)' },
                'background': { desc: '背景全般（色、画像など）', example: '#fff, url(image.jpg), linear-gradient(...)' },
                'font-size': { desc: 'フォントサイズ', example: '16px, 1.5em, 100%' },
                'font-weight': { desc: 'フォントの太さ', example: '400, 700, bold, normal' },
                'font-family': { desc: 'フォント種類', example: 'Arial, "Times New Roman", serif' },
                'padding': { desc: '内側の余白（上右下左）', example: '10px, 10px 20px, 10px 20px 10px 20px' },
                'margin': { desc: '外側の余白（上右下左）', example: '10px, 10px 20px, 0 auto' },
                'border': { desc: 'ボーダー（幅 スタイル 色）', example: '1px solid #ddd, 2px dashed red' },
                'border-radius': { desc: '角の丸み', example: '5px, 50%, 5px 10px' },
                'width': { desc: '幅', example: '100%, 300px, 50vw' },
                'height': { desc: '高さ', example: '100px, 100%, auto' },
                'box-shadow': { desc: 'ボックスのシャドウ', example: '0 2px 8px rgba(0,0,0,0.1)' },
                'text-align': { desc: 'テキストの配置', example: 'left, center, right, justify' },
                'line-height': { desc: '行の高さ', example: '1.5, 20px, 150%' },
                'letter-spacing': { desc: '文字間隔', example: '1px, 0.1em' },
                'display': { desc: 'レイアウトモード', example: 'block, inline, flex, grid, none' },
                'flex-direction': { desc: 'フレックスの方向', example: 'row, column, row-reverse' },
                'justify-content': { desc: 'フレックスの主軸配置', example: 'flex-start, center, space-between' },
                'align-items': { desc: 'フレックスの交差軸配置', example: 'flex-start, center, stretch' },
                'gap': { desc: 'フレックス/グリッドのアイテム間隔', example: '10px, 10px 20px' },
                'position': { desc: '位置指定方法', example: 'static, relative, absolute, fixed' },
                'top': { desc: '上からの距離', example: '10px, -5px, 50%' },
                'left': { desc: '左からの距離', example: '10px, -5px, 50%' },
                'opacity': { desc: '透明度', example: '0.5, 1, 0' },
                'transform': { desc: '変形（回転、スケール、移動）', example: 'rotate(45deg), scale(1.5), translate(10px, 20px)' },
                'transition': { desc: 'アニメーション効果', example: 'all 0.3s, color 0.5s ease-in-out' },
                'cursor': { desc: 'マウスカーソルのスタイル', example: 'pointer, default, text, wait' },
                'overflow': { desc: 'はみ出し時の表示', example: 'hidden, scroll, auto' },
                'text-decoration': { desc: 'テキストの装飾', example: 'none, underline, line-through' },
                'text-shadow': { desc: 'テキストシャドウ', example: '2px 2px 4px rgba(0,0,0,0.3)' },
                'background-image': { desc: '背景画像', example: 'url(image.jpg), linear-gradient(to right, red, blue)' },
                'z-index': { desc: '重なり順', example: '1, 10, 100' }
            };

            const templates = {
                templateA: {
                    name: 'テンプレートA',
                    html: '<h1>テンプレートA</h1><p>これはシンプルで汎用的なデザインです。</p><button>サンプルボタン</button>'
                },
                templateB: {
                    name: 'テンプレートB',
                    html: '<div class="card"><h2>カード1</h2><p>カード型のレイアウトです。</p></div><div class="card"><h2>カード2</h2><p>複数のカードを使用できます。</p></div>'
                },
                templateC: {
                    name: 'テンプレートC',
                    html: '<article><h1>記事タイトル</h1><p>このテンプレートはブログや記事向けです。</p><h2>セクション1</h2><p>テキストの可読性を重視した設計です。</p></article>'
                }
            };

            const templatesList = document.getElementById('templates-list');
            const propertyTrigger = document.getElementById('property-trigger');
            const propertyOptions = document.getElementById('property-options');
            const propertySelected = document.getElementById('property-selected');
            const valueInput = document.getElementById('value-input');
            const addBtn = document.getElementById('add-btn');
            const clearBtn = document.getElementById('clear-btn');
            const cssRulesList = document.getElementById('css-rules-list');
            const cssOutput = document.getElementById('css-output');
            const preview = document.getElementById('preview');
            const copyBtn = document.getElementById('copy-btn');
            const propertyDescription = document.getElementById('property-description');

            let cssRules = {};
            let currentTemplate = null;
            let selectedProperty = null;

            // テンプレート表示
            function renderTemplates() {
                templatesList.innerHTML = '';
                for (let key in templates) {
                    const template = templates[key];
                    const div = document.createElement('div');
                    div.className = 'template-item';
                    div.innerHTML = `<div class="template-name">${template.name}</div>`;
                    div.addEventListener('click', () => selectTemplate(key));
                    templatesList.appendChild(div);
                }
            }

            // プロパティドロップダウン表示
            function renderPropertyOptions() {
                propertyOptions.innerHTML = '';
                for (let prop in cssProperties) {
                    const option = document.createElement('div');
                    option.className = 'select-option';
                    const propInfo = cssProperties[prop];
                    option.innerHTML = `
                        <div class="select-option-name">${prop}</div>
                        <div class="select-option-desc">${propInfo.desc}</div>
                    `;
                    option.addEventListener('click', () => selectProperty(prop));
                    propertyOptions.appendChild(option);
                }
            }

            // ドロップダウンの開閉
            propertyTrigger.addEventListener('click', function() {
                propertyOptions.classList.toggle('active');
                propertyTrigger.classList.toggle('active');
            });

            // 外側クリックでドロップダウン閉じる
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.custom-select')) {
                    propertyOptions.classList.remove('active');
                    propertyTrigger.classList.remove('active');
                }
            });

            // プロパティ選択
            function selectProperty(prop) {
                selectedProperty = prop;
                propertySelected.textContent = prop;
                propertyOptions.classList.remove('active');
                propertyTrigger.classList.remove('active');
                valueInput.focus();

                // 説明表示
                const propInfo = cssProperties[prop];
                propertyDescription.innerHTML = `
                    <strong>${prop}</strong>
                    ${propInfo.desc}<br>
                    <span style="font-size: 0.9em;">例：${propInfo.example}</span>
                `;
                propertyDescription.classList.add('active');
            }

            // テンプレート選択
            function selectTemplate(templateKey) {
                currentTemplate = templateKey;
                document.querySelectorAll('.template-item').forEach(item => item.classList.remove('active'));
                document.querySelectorAll('.template-item')[Object.keys(templates).indexOf(templateKey)].classList.add('active');
                updatePreview();
            }

            // CSS追加
            function addCSSRule() {
                if (!selectedProperty) {
                    alert('プロパティを選択してください');
                    return;
                }

                const value = valueInput.value.trim();

                if (!value) {
                    alert('値を入力してください');
                    return;
                }

                cssRules[selectedProperty] = value;
                valueInput.value = '';
                propertySelected.textContent = 'プロパティを選択...';
                selectedProperty = null;
                propertyDescription.classList.remove('active');

                updateDisplay();
            }

            addBtn.addEventListener('click', addCSSRule);
            valueInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') addCSSRule();
            });

            // CSS削除
            window.deleteCSSRule = function(property) {
                delete cssRules[property];
                updateDisplay();
            };

            // 表示更新
            function updateDisplay() {
                updateCSSList();
                updateCSSOutput();
                updatePreview();
            }

            function updateCSSList() {
                if (Object.keys(cssRules).length === 0) {
                    cssRulesList.innerHTML = '<div class="empty-list">プロパティはまだ追加されていません</div>';
                    return;
                }

                cssRulesList.innerHTML = '';
                for (let property in cssRules) {
                    const item = document.createElement('div');
                    item.className = 'css-rule-item';
                    item.innerHTML = `
                        <div>
                            <span class="css-rule-property">${property}:</span>
                            <span class="css-rule-value">${cssRules[property]}</span>
                        </div>
                        <button class="btn btn-danger btn-small" onclick="deleteCSSRule('${property}')">削除</button>
                    `;
                    cssRulesList.appendChild(item);
                }
            }

            function updateCSSOutput() {
                let cssCode = "";

                for (let property in cssRules) {
                    cssCode += `${property}: ${cssRules[property]};\n`;
                }

                cssOutput.querySelector('code').textContent = cssCode;
            }

            function updatePreview() {
                if (!currentTemplate) {
                    preview.innerHTML = '<div class="loading">テンプレートを選択してください</div>';
                    return;
                }

                const template = templates[currentTemplate];
                let styles = '';

                for (let property in cssRules) {
                    styles += `${property}: ${cssRules[property]}; `;
                }

                preview.innerHTML = `<div style="${styles}">${template.html}</div>`;
            }

            // クリア
            clearBtn.addEventListener('click', function() {
                if (confirm('すべてのプロパティを削除しますか？')) {
                    cssRules = {};
                    updateDisplay();
                }
            });

            // コピー
            copyBtn.addEventListener('click', function() {
                const cssCode = cssOutput.querySelector('code').textContent;
                
                if (!cssCode.trim() || cssCode.includes('CSSがここに表示されます')) {
                    alert('コピーするCSSがありません');
                    return;
                }

                navigator.clipboard.writeText(cssCode).then(() => {
                    const originalText = copyBtn.textContent;
                    copyBtn.textContent = 'コピーしました！';
                    
                    setTimeout(() => {
                        copyBtn.textContent = originalText;
                    }, 2000);
                }).catch(err => {
                    alert('コピーに失敗しました');
                });
            });

            // 初期化
            renderTemplates();
            renderPropertyOptions();
        });
    </script>
</body>
</html>
