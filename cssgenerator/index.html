<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSSジェネレーター</title>
    <meta name="author" content="utakeuchigames">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.5em;
        }

        h2 {
            color: #555;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .templates-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
        }

        .template-item {
            background: white;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .template-item:hover {
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.2);
            transform: translateX(5px);
        }

        .template-item.active {
            background: #e7f0ff;
            border-left-color: #667eea;
        }

        .template-name {
            font-weight: 600;
            color: #333;
            font-size: 1.1em;
        }

        .editor-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
        }

        .input-group {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            flex: 1;
        }

        .input-wrapper {
            flex: 1;
        }

        input[type="text"],
        input[type="color"],
        textarea {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="color"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 0.9em;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .button-group .btn {
            flex: 1;
        }

        .css-rules-list {
            background: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .css-rule-item {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .css-rule-item:last-child {
            border-bottom: none;
        }

        .css-rule-property {
            font-weight: 600;
            color: #667eea;
            font-family: 'Courier New', monospace;
        }

        .css-rule-value {
            color: #666;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }

        .preview-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 30px;
        }

        .output {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 0.95em;
            line-height: 1.5;
            max-height: 300px;
            overflow-y: auto;
        }

        code {
            font-family: 'Courier New', monospace;
        }

        .preview-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
        }

        .preview-content {
            background: white;
            border: 2px solid #ddd;
            border-radius: 5px;
            padding: 20px;
            overflow-y: auto;
            max-height: 500px;
        }

        .copy-btn {
            width: 100%;
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 12px 15px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 0.95em;
        }

        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 1.8em;
            }

            .input-group {
                flex-direction: column;
                align-items: flex-start;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CSSジェネレーター</h1>
        
        <div class="main-layout">
            <div class="templates-section">
                <h2>テンプレート</h2>
                <div id="templates-list"></div>
            </div>

            <div class="editor-section">
                <h2>CSS設定</h2>
                <div class="info-box">
                💡 プロパティと値を入力して「追加」をクリック、または下のリストから編集・削除できます。
                </div>
                
                <div id="editor-container">
                    <div class="input-group">
                        <div class="input-wrapper">
                            <label>プロパティ名:</label>
                            <input type="text" id="property-input" placeholder="例: color, background-color, padding">
                        </div>
                        <div class="input-wrapper">
                            <label>値:</label>
                            <input type="text" id="value-input" placeholder="例: #333, 10px, 1.5">
                        </div>
                        <button class="btn btn-primary btn-small" id="add-btn">追加</button>
                    </div>

                    <div class="input-group">
                        <label>または直接CSS編集:</label>
                    </div>
                    <textarea id="custom-css" placeholder="直接CSSを記述：&#10;color: #333;&#10;background-color: white;&#10;padding: 20px;"></textarea>

                    <div class="button-group">
                        <button class="btn btn-success" id="update-custom-btn">カスタムCSS更新</button>
                        <button class="btn btn-danger" id="clear-btn">すべてクリア</button>
                    </div>

                    <h3 style="margin-top: 20px; margin-bottom: 10px; font-size: 1.1em; color: #555;">追加されたプロパティ:</h3>
                    <div class="css-rules-list" id="css-rules-list">
                        <div class="css-rule-item" style="color: #999;">プロパティはまだ追加されていません</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="preview-section">
            <h2>プレビュー</h2>
            
            <div class="output">
                <h3 style="margin-bottom: 10px; font-size: 1.1em;">生成されたCSS:</h3>
                <pre id="css-output"><code>/* CSSがここに表示されます */</code></pre>
                <button id="copy-btn" class="btn btn-secondary copy-btn">コピー</button>
            </div>

            <div class="preview-box">
                <h3 style="margin-bottom: 10px; font-size: 1.1em;">プレビュー:</h3>
                <div id="preview" class="preview-content">
                    <div class="loading">プロパティを追加するとプレビューが表示されます</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const templates = {
                templateA: {
                    name: 'テンプレートA',
                    html: '<h1>テンプレートA</h1><p>これはシンプルで汎用的なデザインです。</p><button>サンプルボタン</button>'
                },
                templateB: {
                    name: 'テンプレートB',
                    html: '<div class="card"><h2>カード1</h2><p>カード型のレイアウトです。</p></div><div class="card"><h2>カード2</h2><p>複数のカードを使用できます。</p></div>'
                },
                templateC: {
                    name: 'テンプレートC',
                    html: '<article><h1>記事タイトル</h1><p>このテンプレートはブログや記事向けです。</p><h2>セクション1</h2><p>テキストの可読性を重視した設計です。</p></article>'
                }
            };

            const templatesList = document.getElementById('templates-list');
            const propertyInput = document.getElementById('property-input');
            const valueInput = document.getElementById('value-input');
            const customCssInput = document.getElementById('custom-css');
            const addBtn = document.getElementById('add-btn');
            const updateCustomBtn = document.getElementById('update-custom-btn');
            const clearBtn = document.getElementById('clear-btn');
            const cssRulesList = document.getElementById('css-rules-list');
            const cssOutput = document.getElementById('css-output');
            const preview = document.getElementById('preview');
            const copyBtn = document.getElementById('copy-btn');

            let cssRules = {};
            let currentTemplate = null;

            function renderTemplates() {
                templatesList.innerHTML = '';
                for (let key in templates) {
                    const template = templates[key];
                    const div = document.createElement('div');
                    div.className = 'template-item';
                    div.innerHTML = `<div class="template-name">${template.name}</div>`;
                    div.addEventListener('click', () => selectTemplate(key));
                    templatesList.appendChild(div);
                }
            }

            function selectTemplate(templateKey) {
                currentTemplate = templateKey;
                document.querySelectorAll('.template-item').forEach(item => item.classList.remove('active'));
                document.querySelectorAll('.template-item')[Object.keys(templates).indexOf(templateKey)].classList.add('active');
                updatePreview();
            }

            function addCSSRule() {
                const property = propertyInput.value.trim();
                const value = valueInput.value.trim();

                if (!property || !value) {
                    alert('プロパティと値を入力してください');
                    return;
                }

                cssRules[property] = value;
                propertyInput.value = '';
                valueInput.value = '';
                propertyInput.focus();

                updateDisplay();
            }

            function updateCustomCSS() {
                const customCss = customCssInput.value.trim();
                
                if (!customCss) {
                    alert('CSSを入力してください');
                    return;
                }

                // CSSを解析して追加
                const lines = customCss.split(';').filter(line => line.trim());
                lines.forEach(line => {
                    const [prop, val] = line.split(':').map(s => s.trim());
                    if (prop && val) {
                        cssRules[prop] = val;
                    }
                });

                customCssInput.value = '';
                updateDisplay();
            }

            function updateDisplay() {
                updateCSSList();
                updateCSSOutput();
                updatePreview();
            }

            function updateCSSList() {
                if (Object.keys(cssRules).length === 0) {
                    cssRulesList.innerHTML = '<div class="css-rule-item" style="color: #999;">プロパティはまだ追加されていません</div>';
                    return;
                }

                cssRulesList.innerHTML = '';
                for (let property in cssRules) {
                    const item = document.createElement('div');
                    item.className = 'css-rule-item';
                    item.innerHTML = `
                        <div>
                            <span class="css-rule-property">${property}:</span>
                            <span class="css-rule-value">${cssRules[property]}</span>
                        </div>
                        <button class="btn btn-danger btn-small" onclick="deleteCSSRule('${property}')">削除</button>
                    `;
                    cssRulesList.appendChild(item);
                }
            }

            function updateCSSOutput() {
                let cssCode = '.preview-content {\n';

                for (let property in cssRules) {
                    cssCode += `    ${property}: ${cssRules[property]};\n`;
                }

                cssCode += '}';

                cssOutput.querySelector('code').textContent = cssCode;
            }

            function updatePreview() {
                if (!currentTemplate) {
                    preview.innerHTML = '<div class="loading">テンプレートを選択してください</div>';
                    return;
                }

                const template = templates[currentTemplate];
                let styles = '';

                for (let property in cssRules) {
                    styles += `${property}: ${cssRules[property]}; `;
                }

                preview.innerHTML = `
                    <div style="${styles}">
                        ${template.html}
                    </div>
                `;
            }

            window.deleteCSSRule = function(property) {
                delete cssRules[property];
                updateDisplay();
            };

            addBtn.addEventListener('click', addCSSRule);
            valueInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') addCSSRule();
            });

            updateCustomBtn.addEventListener('click', updateCustomCSS);

            clearBtn.addEventListener('click', function() {
                if (confirm('すべてのプロパティを削除しますか？')) {
                    cssRules = {};
                    customCssInput.value = '';
                    updateDisplay();
                }
            });

            copyBtn.addEventListener('click', function() {
                const cssCode = cssOutput.querySelector('code').textContent;
                
                if (!cssCode.trim() || cssCode.includes('CSSがここに表示されます')) {
                    alert('コピーするCSSがありません');
                    return;
                }

                navigator.clipboard.writeText(cssCode).then(() => {
                    const originalText = copyBtn.textContent;
                    copyBtn.textContent = 'コピーしました！';
                    
                    setTimeout(() => {
                        copyBtn.textContent = originalText;
                    }, 2000);
                }).catch(err => {
                    alert('コピーに失敗しました');
                });
            });

            renderTemplates();
        });
    </script>
</body>
</html>
