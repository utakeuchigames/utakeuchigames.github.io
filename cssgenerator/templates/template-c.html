<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article Template</title>
    <style id="template-styles">
        :root {
            --heading-color: #222222;
            --font-size: 16px;
            --line-height: 1.6;
        }
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: var(--font-size);
            line-height: var(--line-height);
            background-color: #fafafa;
            color: #333;
        }
        .article {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: white;
        }
        h1, h2, h3 {
            color: var(--heading-color);
            margin-top: 32px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 2em;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }
        h2 {
            font-size: 1.6em;
        }
        p {
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="article">
        <h1>Article Title</h1>
        <p>This template is designed for blogs and articles.</p>
        <h2>Section 1</h2>
        <p>Template C prioritizes text readability.</p>
    </div>
</body>
</html>
