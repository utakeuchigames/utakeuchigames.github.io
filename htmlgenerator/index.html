<!DOCTYPE html>
<html lang="ja" id="main-html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML/XHTML 統合ジェネレーター</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; max-width: 900px; margin: 0 auto; background-color: #f4f7f9; }
        h1 { border-bottom: 4px solid #007bff; padding-bottom: 10px; color: #333; }
        .section { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        select, input, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { cursor: pointer; border: none; border-radius: 6px; padding: 12px 20px; font-weight: bold; transition: 0.2s; }
        .btn-add { background-color: #28a745; color: #fff; width: 100%; margin-top: 15px; }
        .btn-generate { background-color: #007bff; color: #fff; width: 100%; font-size: 1.2em; margin-top: 25px; }
        .btn-delete { background-color: #e74c3c; color: #fff; float: right; padding: 5px 12px; font-size: 12px; }
        .item-box { border-left: 6px solid #007bff; background: #f0f7ff; padding: 15px; margin: 15px 0; border-radius: 0 6px 6px 0; position: relative; }
        .result-code { background: #222; color: #fff; padding: 25px; border-radius: 8px; white-space: pre-wrap; font-family: monospace; display: none; margin-top: 25px; border: 1px solid #444; }
    </style>
</head>
<body>

    <h1>HTML/XHTML 統合ジェネレーター</h1>

    <div class="section">
        <label>1. 出力形式と基本設定</label>
        <select id="dtd-select">
            <option value="html5">HTML5 (標準)</option>
            <option value="html4.01">HTML 4.01 (古いパソコン用)</option>
            <option value="xhtml">XHTML 1.0 (厳格な形式)</option>
        </select>
        <input type="text" id="page-title" placeholder="ページのタイトルを入力">
    </div>

    <div class="section">
        <label>2. 追加するタグを選択</label>
        <select id="add-tag-type">
            <optgroup label="メタ情報 (Meta)">
                <option value="meta-description" data-input="textarea">説明文 (description)</option>
                <option value="meta-author" data-input="text">作成者 (author)</option>
                <option value="meta-robots" data-input="select-robots">巡回指示 (robots)</option>
            </optgroup>
            <optgroup label="外部連携 (Link)">
                <option value="link-stylesheet" data-input="text">スタイルシート (stylesheet)</option>
                <option value="link-icon" data-input="text">アイコン (favicon)</option>
            </optgroup>
        </select>
        <button type="button" id="btn-add-tag" class="btn-add">+ 項目を追加する</button>
    </div>

    <form id="master-form">
        <div id="tag-container"></div>
        <button type="submit" class="btn-generate">コードを生成して適用する</button>
    </form>

    <div id="result-box" class="result-code"></div>

    <script>
    $(function() {
        // 項目の動的追加
        $('#btn-add-tag').on('click', function() {
            const $selected = $('#add-tag-type option:selected');
            const type = $selected.val();
            const label = $selected.text().split(' - ')[0];
            const inputType = $selected.data('input');
            
            let inputHtml = (inputType === 'textarea') ? 
                `<textarea class="val" placeholder="内容を入力"></textarea>` : 
                (inputType === 'select-robots') ? 
                `<select class="val"><option value="index,follow">許可</option><option value="noindex,nofollow">拒否</option></select>` : 
                `<input type="text" class="val" placeholder="内容を入力">`;

            $('#tag-container').append(`
                <div class="item-box" data-type="${type}">
                    <button type="button" class="btn-delete">削除</button>
                    <strong>${label}</strong><br>${inputHtml}
                </div>`);
        });

        // 項目の削除
        $(document).on('click', '.btn-delete', function() { $(this).parent().remove(); });

        // 生成と合体ロジック
        $('#master-form').on('submit', function(e) {
            e.preventDefault();
            const dtd = $('#dtd-select').val();
            const close = (dtd === 'xhtml') ? ' /' : '';
            const title = $('#page-title').val();
            let codes = [];

            // 11歳の全書き：htmlタグの属性操作（マージ是正）
            const $html = $('#main-html-tag');
            if (dtd === 'xhtml') {
                $html.removeAttr('lang').attr('xml:lang', 'ja');
                codes.push(`&lt;!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd"&gt;`);
                codes.push(`&lt;html xmlns="http://www.w3.org/1999/xhtml" xml:lang="ja"&gt;`);
            } else {
                $html.removeAttr('xml:lang').attr('lang', 'ja');
                codes.push(`&lt;!DOCTYPE html&gt;`);
                codes.push(`&lt;html lang="ja"&gt;`);
            }

            if (title) codes.push(`&lt;title&gt;${title}&lt;/title&gt;`);

            $('.item-box').each(function() {
                const type = $(this).data('type');
                const val = $(this).find('.val').val();
                if (val) {
                    if (type.startsWith('meta-')) {
                        codes.push(`&lt;meta name="${type.replace('meta-', '')}" content="${val}"${close}&gt;`);
                    } else if (type.startsWith('link-')) {
                        codes.push(`&lt;link rel="${type.replace('link-', '')}" href="${val}"${close}&gt;`);
                    }
                }
            });

            $('#result-box').html(codes.join('\n') + '\n&lt;/html&gt;').fadeIn(300);
        });
    });
    </script>
</body>
</html>
