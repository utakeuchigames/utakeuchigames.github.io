<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" >
    <title>toggletest</title>
    <style>
      .toggle_input {
        position: adsolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        z-index: 5;
        opacity: 0;
        cursor: pointer;
      }

      .toggle_label {
        width: 75px;
        height: 35px;
        background: #ccc;
        position: relative;
        display: inline-block;
        border-radius: 40px;
        transition: 0.2s;
        box-sizing: border-box;
      }

      .toggle_label:after {
        content: "";
        position: absolute;
        width: 35px;
        height: 35px;
        border-radius: 100px;
        left: 0;
        top: 0;
        z-index: 2;
        background: #fff;
        box-shadow: 0 00 5px rgba(0, 0, 0, 0.2);
        transition: 0.2s;
      }

      .toggle_input:checked + .toggle_label {
        background-color: #4BD865;
      }

      .toggle_input:checked + .toggle_label:after {
        left: 40px;
      }

      .toggle_button {
        position: relative;
        width: 75px;
        height: 35px;
        margin: auto;
      }
    </style>
</head>
<body>
<div class="toggle_button">
  <input id="toggle" class="toggle_input" type="checkbox" />
  <label for="toggle" class="toggle_label" />
</div>
</body>
</html>
