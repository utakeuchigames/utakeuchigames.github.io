<!DOCTYPE html>
<html lang="ja">
<body>
    <div style="font-family:monospace; background:#000; color:#0f0; padding:20px;">
        <div>[SECRET]: tobki4g7myxdvqzt</div>
        <hr>
        <div id="unix" style="font-size:1.2rem;">Time: Loading...</div>
        <div id="otp" style="font-size:3rem; font-weight:bold;">Code: Loading...</div>
        <hr>
        <div id="debug" style="color:#888;"></div>
    </div>

    <script>
        // RFC6238 準拠の TOTP 計算 (もっともシンプルな実装)
        async function solve() {
            const secret = "tobki4g7myxdvqzt";
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
            
            // Base32 Decode
            let bits = "";
            for(let i=0; i<secret.length; i++){
                bits += alphabet.indexOf(secret[i]).toString(2).padStart(5, '0');
            }
            const key = new Uint8Array(bits.match(/.{8}/g).map(b => parseInt(b, 2)));

            // Time Step
            const now = Math.floor(Date.now() / 1000);
            document.getElementById('unix').innerText = "UnixTime: " + now;
            const counter = new Uint8Array(8);
            const hexTime = Math.floor(now / 30).toString(16).padStart(16, '0');
            for(let i=0; i<8; i++) counter[i] = parseInt(hexTime.substr(i*2, 2), 16);

            // HMAC-SHA1
            const cryptoKey = await window.crypto.subtle.importKey("raw", key, {name: "HMAC", hash: "SHA-1"}, false, ["sign"]);
            const sig = await window.crypto.subtle.sign("HMAC", cryptoKey, counter);
            const hmac = new Uint8Array(sig);
            const offset = hmac[19] & 0xf;
            const otp = ((hmac[offset] & 0x7f) << 24 | (hmac[offset+1] & 0xff) << 16 | (hmac[offset+2] & 0xff) << 8 | (hmac[offset+3] & 0xff)) % 1000000;
            
            document.getElementById('otp').innerText = "Code: " + otp.toString().padStart(6, '0');
        }
        setInterval(solve, 1000);
        solve();
    </script>
</body>
</html>
