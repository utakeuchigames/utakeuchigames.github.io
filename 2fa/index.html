<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Node Pro</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #0d1117; color: #c9d1d9; }
        .container { background: #161b22; padding: 30px; border-radius: 16px; border: 1px solid #30363d; text-align: center; width: 85%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .msg { font-size: 0.8rem; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
        #code { font-size: 4.5rem; font-weight: 800; color: #58a6ff; font-family: 'Courier New', monospace; margin: 15px 0; }
        .progress-container { width: 100%; height: 6px; background: #30363d; border-radius: 3px; margin-top: 10px; overflow: hidden; }
        #progress-bar { height: 100%; background: #238636; width: 0%; transition: width 1s linear; }
        #timer-text { font-size: 0.9rem; margin-top: 8px; color: #8b949e; }
    </style>
</head>
<body>

<div class="container">
    <div class="msg">Security Token for yamaki3970</div>
    <div id="code">------</div>
    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>
    <div id="timer-text">--s</div>
</div>

<script>
    // 32文字以上の長い鍵にも対応した精密なBase32デコーダー
    function base32ToUint8Array(base32) {
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
        const s = base32.replace(/\s/g, "").toUpperCase().replace(/=+$/, "");
        const len = s.length;
        const out = new Uint8Array(((len * 5) / 8) | 0);
        let bits = 0, value = 0, index = 0;

        for (let i = 0; i < len; i++) {
            value = (value << 5) | alphabet.indexOf(s[i]);
            bits += 5;
            if (bits >= 8) {
                out[index++] = (value >>> (bits - 8)) & 255;
                bits -= 8;
            }
        }
        return out;
    }

    async function generateOTP() {
        // URLの#以降を取得
        const secret = window.location.hash.replace('#', '');
        const codeEl = document.getElementById('code');
        const barEl = document.getElementById('progress-bar');
        const textEl = document.getElementById('timer-text');

        if (!secret || secret.length < 8) {
            codeEl.innerText = "SET KEY";
            codeEl.style.fontSize = "2rem";
            return;
        } else {
            codeEl.style.fontSize = "4.5rem";
        }

        try {
            const keyBytes = base32ToUint8Array(secret);
            const epoch = Math.floor(Date.now() / 1000);
            const counter = Math.floor(epoch / 30);

            // カウンターを8バイトのバイナリに変換
            const buf = new ArrayBuffer(8);
            new DataView(buf).setUint32(4, counter);

            const cryptoKey = await window.crypto.subtle.importKey(
                "raw", keyBytes, { name: "HMAC", hash: "SHA-1" }, false, ["sign"]
            );
            const signature = await window.crypto.subtle.sign("HMAC", cryptoKey, buf);
            const hmac = new Uint8Array(signature);

            const offset = hmac[hmac.length - 1] & 0xf;
            const otp = ((hmac[offset] & 0x7f) << 24 | (hmac[offset + 1] & 0xff) << 16 | (hmac[offset + 2] & 0xff) << 8 | (hmac[offset + 3] & 0xff)) % 1000000;
            
            codeEl.innerText = otp.toString().padStart(6, '0');

            // タイマー表示
            const timeLeft = 30 - (epoch % 30);
            barEl.style.width = (timeLeft / 30) * 100 + "%";
            textEl.innerText = "Next update in: " + timeLeft + "s";

        } catch (e) {
            codeEl.innerText = "ERR";
            console.error(e);
        }
    }

    setInterval(generateOTP, 1000);
    generateOTP();

    // ハッシュが変わったら即更新
    window.addEventListener('hashchange', generateOTP);
</script>
</body>
</html>
