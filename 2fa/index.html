<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Offline</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #1a1a1a; color: white; }
        #code { font-size: 4rem; font-weight: bold; color: #4af; letter-spacing: 4px; }
        #timer { margin-top: 10px; color: #888; }
    </style>
</head>
<body>
    <div id="label">2FA CODE</div>
    <div id="code">LOADING</div>
    <div id="timer">--s</div>

    <script>
        // Base32をデコードする関数
        function base32ToHex(base32) {
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
            let bits = "";
            let hex = "";
            for (let i = 0; i < base32.length; i++) {
                let val = alphabet.indexOf(base32.charAt(i).toUpperCase());
                if (val === -1) continue;
                bits += val.toString(2).padStart(5, '0');
            }
            for (let i = 0; i + 4 <= bits.length; i += 4) {
                hex += parseInt(bits.substring(i, i + 4), 2).toString(16);
            }
            return hex;
        }

        // TOTP生成メイン関数 (外部ライブラリ不要)
        async function generateTOTP(secret) {
            try {
                const epoch = Math.floor(Date.now() / 1000);
                const time = Math.floor(epoch / 30);
                const timeHex = time.toString(16).padStart(16, '0');

                const keyHex = base32ToHex(secret);
                const keyBytes = new Uint8Array(keyHex.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
                const msgBytes = new Uint8Array(timeHex.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));

                const cryptoKey = await window.crypto.subtle.importKey(
                    "raw", keyBytes, { name: "HMAC", hash: "SHA-1" }, false, ["sign"]
                );
                const signature = await window.crypto.subtle.sign("HMAC", cryptoKey, msgBytes);
                
                const hmac = new Uint8Array(signature);
                const offset = hmac[hmac.length - 1] & 0xf;
                const otp = ((hmac[offset] & 0x7f) << 24 | (hmac[offset + 1] & 0xff) << 16 | (hmac[offset + 2] & 0xff) << 8 | (hmac[offset + 3] & 0xff)) % 1000000;
                
                return otp.toString().padStart(6, '0');
            } catch (e) {
                return "ERR";
            }
        }

        async function update() {
            const secret = window.location.hash.replace('#', '').replace(/\s/g, '');
            if (!secret) {
                document.getElementById('code').innerText = "NO HASH";
                return;
            }

            const code = await generateTOTP(secret);
            document.getElementById('code').innerText = code;
            
            const timeLeft = 30 - (Math.floor(Date.now() / 1000) % 30);
            document.getElementById('timer').innerText = `Next: ${timeLeft}s`;
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
